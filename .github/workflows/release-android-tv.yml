# APK de instalación para Android / Android TV (firma debug de Gradle; sirve para sideload).
# URL estable (mismo nombre de archivo en cada release):
#   https://github.com/svicens-star/streamnexus/releases/latest/download/StreamNexus-TV-install.apk
#
# Disparo: git tag v0.0.x && git push origin v0.0.x

name: Release Android TV (APK sideload)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  android-tv-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools'

      - name: Install API 36 + build-tools
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;34.0.0"

      - name: Gradle SDK path
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > android/local.properties

      - name: Build web + Capacitor (solo Android) + debug APK
        run: |
          npm install --no-audit --no-fund
          npm run mobile:build:android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare asset name
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk StreamNexus-TV-install.apk
          ls -la StreamNexus-TV-install.apk

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ github.ref_name }}
          files: StreamNexus-TV-install.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
