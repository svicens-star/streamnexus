# APK para Android TV / móvil (debug). URL estable:
#   https://github.com/svicens-star/streamnexus/releases/latest/download/StreamNexus-TV-install.apk
#
# Tag: git tag v0.0.x && git push origin v0.0.x

name: Release Android TV (APK sideload)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

jobs:
  android-tv-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Android SDK (CLI + API 36)
        run: |
          set -e
          SDK="$HOME/android-sdk"
          mkdir -p "$SDK/cmdline-tools/latest"
          curl -fsSL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o /tmp/clt.zip
          unzip -q /tmp/clt.zip -d /tmp/clt
          # El zip trae una carpeta cmdline-tools con bin/, lib/, etc.
          cp -a /tmp/clt/cmdline-tools/. "$SDK/cmdline-tools/latest/"
          export ANDROID_SDK_ROOT="$SDK"
          export PATH="$PATH:$SDK/cmdline-tools/latest/bin"
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;34.0.0"
          echo "ANDROID_SDK_ROOT=$SDK" >> $GITHUB_ENV
          echo "$SDK/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$SDK/platform-tools" >> $GITHUB_PATH

      - name: Gradle SDK path
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > android/local.properties

      - name: Build web + Capacitor (solo Android) + debug APK
        run: |
          npm ci
          npm run mobile:build:android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Prepare asset name
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk StreamNexus-TV-install.apk
          ls -la StreamNexus-TV-install.apk

      - name: Upload APK (artefacto Actions; sirve si Release falla)
        uses: actions/upload-artifact@v4
        with:
          name: StreamNexus-TV-install
          path: StreamNexus-TV-install.apk

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ github.ref_name }}
          files: StreamNexus-TV-install.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
