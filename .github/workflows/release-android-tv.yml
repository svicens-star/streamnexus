# APK de instalación para Android / Android TV (firma debug de Gradle; sirve para sideload).
# Nombre fijo del archivo → URL estable para compartir en la TV:
#   https://github.com/svicens-star/streamnexus/releases/latest/download/StreamNexus-TV-install.apk
#
# Se ejecuta al empujar un tag v* (junto al workflow de Windows). No requiere secretos.

name: Release Android TV (APK sideload)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  android-tv-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: SDK components + local.properties
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          yes | sdkmanager --licenses || true
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > android/local.properties

      - name: Build web + Capacitor + debug APK
        run: |
          npm ci
          npm run mobile:build
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Prepare asset name
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk StreamNexus-TV-install.apk
          ls -la StreamNexus-TV-install.apk

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: StreamNexus-TV-install.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
