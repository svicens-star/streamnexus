# Publica el instalador Windows y latest.yml en GitHub Releases.
# Manual: Actions → Release Windows → Run workflow (el build de Windows en CI suele ser más exigente).
# Para APK TV automático al etiquetar, usá release-android-tv.yml.

name: Release Windows (StreamNexus)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install and build installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          NODE_OPTIONS: '--max-old-space-size=6144'
        run: |
          npm ci
          npm run electron:dist:ci

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
