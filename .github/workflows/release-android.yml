# Compila APK y AAB firmados y los sube al release de GitHub al publicar un tag v*.*
# Secretos del repo (Settings → Secrets):
#   ANDROID_KEYSTORE_BASE64 — base64 del archivo upload-keystore.jks (una línea)
#   ANDROID_KEYSTORE_PASSWORD — contraseña del almacén
#   ANDROID_KEY_PASSWORD — contraseña de la clave (a menudo igual que la del almacén)
#   ANDROID_KEY_ALIAS — alias, ej. upload
#
# Generar BASE64 (PowerShell): [Convert]::ToBase64String([IO.File]::ReadAllBytes("android\upload-keystore.jks"))

name: Release Android (APK + AAB)

# Solo manual: requiere secretos de firma. El APK para TV sale del workflow release-android-tv.yml al etiquetar v*.
on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"
          yes | sdkmanager --licenses || true
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > android/local.properties

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Falta secret ANDROID_KEYSTORE_BASE64. Configurá los secretos del workflow o compilá en local."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ]; then
            echo "Faltan ANDROID_KEYSTORE_PASSWORD o ANDROID_KEY_ALIAS"
            exit 1
          fi
          KP="${KEY_PASSWORD:-$STORE_PASSWORD}"
          {
            echo "storePassword=$STORE_PASSWORD"
            echo "keyPassword=$KP"
            echo "keyAlias=$KEY_ALIAS"
            echo "storeFile=../upload-keystore.jks"
          } > android/keystore.properties

      - name: npm ci and Capacitor sync (solo Android)
        run: |
          npm ci
          npm run mobile:build:android

      - name: Gradle assembleRelease + bundleRelease
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Upload artifacts to GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifacts (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: streamnexus-android-release
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
